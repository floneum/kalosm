name: Criterion Compare
description: Run Criterion on the PR and base branch, then compare baselines with critcmp.

inputs:
  branchName:
    description: Base branch to compare against.
    required: true
  cwd:
    description: Directory where the benchmark crate lives.
    required: true
  baseFallbackCwd:
    description: Optional fallback crate directory for the base branch when a benchmark target moved.
    required: false
    default: ""
  benchName:
    description: Criterion benchmark target to run.
    required: true
  criterionArgs:
    description: Extra arguments to pass to Criterion after `--`.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install critcmp
      shell: bash
      run: cargo install critcmp

    - name: Benchmark changes
      shell: bash
      run: |
        set -euo pipefail
        feature_args=()
        if awk '/^\[/{ in_features = ($0 == "[features]"); next } in_features && /^[[:space:]]*bench[[:space:]]*=/{ found=1 } END { exit found ? 0 : 1 }' "${{ inputs.cwd }}/Cargo.toml"; then
          feature_args=(--features bench)
        fi
        (cd "${{ inputs.cwd }}" && cargo bench "${feature_args[@]}" --bench "${{ inputs.benchName }}" -- ${{ inputs.criterionArgs }} --save-baseline changes)

    - name: Fetch base branch
      shell: bash
      run: git fetch --depth=1 origin "${{ inputs.branchName }}"

    - name: Check out base branch
      shell: bash
      run: git checkout --detach FETCH_HEAD

    - name: Benchmark base
      shell: bash
      run: |
        set -euo pipefail
        bench_name="${{ inputs.benchName }}"
        bench_cwd="${{ inputs.cwd }}"

        has_bench_target() {
          local cargo_toml="$1/Cargo.toml"
          [ -f "$cargo_toml" ] || return 1
          awk -v bench="$bench_name" '
            /^\[\[bench\]\]/ {
              if (in_bench && name == bench) found = 1
              in_bench = 1
              name = ""
              next
            }
            /^\[/ {
              if (in_bench && name == bench) found = 1
              in_bench = 0
            }
            in_bench && /^[[:space:]]*name[[:space:]]*=/ {
              name = $0
              sub(/^[^=]*=[[:space:]]*"/, "", name)
              sub(/".*$/, "", name)
            }
            END {
              if (in_bench && name == bench) found = 1
              exit found ? 0 : 1
            }
          ' "$cargo_toml"
        }

        if ! has_bench_target "$bench_cwd" && [ -n "${{ inputs.baseFallbackCwd }}" ] && has_bench_target "${{ inputs.baseFallbackCwd }}"; then
          bench_cwd="${{ inputs.baseFallbackCwd }}"
        fi

        if ! has_bench_target "$bench_cwd"; then
          echo "Benchmark target '$bench_name' was not found in '$bench_cwd'." >&2
          exit 1
        fi

        feature_args=()
        if awk '/^\[/{ in_features = ($0 == "[features]"); next } in_features && /^[[:space:]]*bench[[:space:]]*=/{ found=1 } END { exit found ? 0 : 1 }' "$bench_cwd/Cargo.toml"; then
          feature_args=(--features bench)
        fi
        (cd "$bench_cwd" && cargo bench "${feature_args[@]}" --bench "$bench_name" -- ${{ inputs.criterionArgs }} --save-baseline base)

    - name: Compare baselines
      shell: bash
      run: |
        set -o pipefail
        {
          echo "### Benchmark comparison: ${{ inputs.benchName }}"
          echo
          echo '```'
          critcmp base changes
          echo '```'
        } | tee -a "$GITHUB_STEP_SUMMARY"
